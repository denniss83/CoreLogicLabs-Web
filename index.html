<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CoreLogicLabs — Build Smarter. Live Better. Play More. AI-powered mobile apps on Google Play." />
  <meta property="og:title" content="CoreLogicLabs" />
  <meta property="og:description" content="AI-powered mobile apps. Modern design, reliable infrastructure, user-focused digital solutions." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://corelogiclabs.github.io/" />
  <meta property="og:image" content="https://corelogiclabs.github.io/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="CoreLogicLabs" />
  <meta property="og:locale" content="en_US" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CoreLogicLabs" />
  <meta name="twitter:description" content="AI-powered mobile apps. Modern design, reliable infrastructure, user-focused digital solutions." />
  <meta name="twitter:image" content="https://corelogiclabs.github.io/assets/og-image.png" />
  <title>CoreLogicLabs</title>
  <!-- Favicon (SVG emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <!-- Canonical -->
  <link rel="canonical" href="https://corelogiclabs.github.io/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════ NAVBAR ═══════ -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">
        <span class="lightning">⚡</span>CoreLogicLabs
      </a>

      <ul class="nav-menu" id="nav-menu">
        <li><a href="#hero"    data-i18n="nav_home"></a></li>
        <li><a href="#apps"    data-i18n="nav_apps"></a></li>
        <li><a href="#about"   data-i18n="nav_about"></a></li>
        <li><a href="#contact" data-i18n="nav_contact"></a></li>
      </ul>

      <div class="nav-actions">
        <button class="lang-btn" data-lang-toggle data-i18n="lang_toggle"></button>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════ HERO ══════════ -->
  <section id="hero">
    <div class="hero-content reveal">
      <h1 data-i18n="hero_title"></h1>
      <p class="hero-subtitle" data-i18n="hero_subtitle"></p>
      <p class="hero-tagline"  data-i18n="hero_tagline"></p>
      <a href="#apps" class="btn-primary" data-i18n="hero_cta"></a>
      <div class="hero-badges">
        <span class="hero-badge">🎮</span>
        <span class="hero-badge">🔮</span>
        <span class="hero-badge">🛠️</span>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ ABOUT ═════════ -->
  <section id="about">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-title" data-i18n="about_title"></h2>
        <p class="about-desc" data-i18n="about_desc"></p>
      </div>

      <div class="features-grid">
        <!-- Feature card: Games -->
        <div class="feature-card reveal">
          <div class="feature-icon">🎮</div>
          <h3 data-i18n="feature_games_title"></h3>
          <p  data-i18n="feature_games_desc"></p>
        </div>

        <!-- Feature card: Lifestyle -->
        <div class="feature-card reveal">
          <div class="feature-icon">🔮</div>
          <h3 data-i18n="feature_lifestyle_title"></h3>
          <p  data-i18n="feature_lifestyle_desc"></p>
        </div>

        <!-- Feature card: Utility -->
        <div class="feature-card reveal">
          <div class="feature-icon">🛠️</div>
          <h3 data-i18n="feature_utility_title"></h3>
          <p  data-i18n="feature_utility_desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ APPS ══════════ -->
  <section id="apps">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-title" data-i18n="apps_title"></h2>
        <p class="section-subtitle" data-i18n="apps_subtitle"></p>
      </div>

      <div class="apps-grid">

        <!-- App Card: Tarot Akademi -->
        <div class="app-card reveal">
          <div class="app-icon" style="background: linear-gradient(135deg, #6b21a8, #d97706)">🔮</div>
          <div class="app-info">
            <span class="app-category" data-i18n="app1_category">Lifestyle</span>
            <h3 data-i18n="app1_name">Tarot Akademi</h3>
            <p  data-i18n="app1_desc"></p>
            <a href="https://play.google.com/store/apps/details?id=com.corelogiclabs.tarotakademi" target="_blank" class="btn-play" data-i18n="btn_google_play">▶ Google Play</a>
          </div>
        </div>

        <!-- TODO: Add more app cards here following the same card structure -->
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ STATS ═════════ -->
  <section id="stats">
    <div class="container">
      <div class="stats-grid">
        <div class="stat-item reveal">
          <span class="stat-number" data-target="1"    data-suffix="+">0</span>
          <span class="stat-label"  data-i18n="stats_apps"></span>
        </div>
        <div class="stat-item reveal">
          <span class="stat-number" data-target="1000" data-suffix="+" data-format="K">0</span>
          <span class="stat-label"  data-i18n="stats_downloads"></span>
        </div>
        <div class="stat-item reveal">
          <span class="stat-number" data-target="500"  data-suffix="+">0</span>
          <span class="stat-label"  data-i18n="stats_users"></span>
        </div>
        <div class="stat-item reveal">
          <span class="stat-number" data-target="22"   data-suffix="">0</span>
          <span class="stat-label"  data-i18n="stats_countries"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ CONTACT ═══════ -->
  <section id="contact">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-title" data-i18n="contact_title"></h2>
        <p class="contact-desc"   data-i18n="contact_desc"></p>
      </div>

      <div class="contact-layout">
        <!-- Info column -->
        <div class="contact-info reveal">
          <!-- Email -->
          <div class="contact-item">
            <span class="ci-icon">📧</span>
            <div>
              <div class="ci-label" data-i18n="contact_email_label"></div>
              <div class="ci-value"><a href="mailto:corelogiclabs@outlook.com">corelogiclabs@outlook.com</a></div>
            </div>
          </div>

          <!-- Google Play -->
          <div class="contact-item">
            <span class="ci-icon">▶</span>
            <div>
              <div class="ci-label" data-i18n="contact_play_label"></div>
              <div class="ci-value"><a href="https://play.google.com/store/apps/dev?id=8711780632580992511" target="_blank">CoreLogicLabs on Google Play</a></div>
            </div>
          </div>

          <!-- Social links -->
          <div class="social-row">
            <a href="#" class="social-link" aria-label="GitHub">🐙</a>
            <a href="#" class="social-link" aria-label="Twitter / X">🐦</a>
            <a href="#" class="social-link" aria-label="LinkedIn">💼</a>
          </div>
        </div>

        <!-- Form column -->
        <!-- TODO: Replace REPLACE_WITH_YOUR_ID with your Formspree form ID -->
        <form class="contact-form reveal" id="contact-form" action="https://formspree.io/f/REPLACE_WITH_YOUR_ID" method="POST" novalidate>
          <input type="hidden" name="_subject" value="CoreLogicLabs Contact Form" />
          <input type="text"  name="name"    data-i18n="form_name"    required />
          <input type="email" name="email"   data-i18n="form_email"   required />
          <textarea           name="message" data-i18n="form_message" required></textarea>
          <button type="submit" class="btn-primary" data-i18n="form_submit"></button>
          <p class="form-note" id="form-success" style="display:none; color:#06b6d4; margin-top:1rem;">✓ Message sent successfully!</p>
        </form>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════ FOOTER ════════ -->
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="nav-logo"><span class="lightning">⚡</span>CoreLogicLabs</div>
        <p class="footer-copy" data-i18n="footer_rights"></p>
      </div>

      <ul class="footer-links">
        <li><a href="#hero"    data-i18n="nav_home"></a></li>
        <li><a href="#apps"    data-i18n="nav_apps"></a></li>
        <li><a href="#about"   data-i18n="nav_about"></a></li>
        <li><a href="#contact" data-i18n="nav_contact"></a></li>
        <!-- TODO: Add privacy policy page -->
        <li><a href="#" data-i18n="footer_privacy"></a></li>
      </ul>

      <div class="footer-actions">
        <button class="lang-btn" data-lang-toggle data-i18n="lang_toggle"></button>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
